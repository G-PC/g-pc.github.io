<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перенаправление</title>
    <meta http-equiv="refresh" content="0; url=https://g-wpi.github.io/g-random/">
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .message {
            text-align: center;
            color: white;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            margin: 0 auto 16px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: white;
        }
    </style>
</head>
<body>
    <div class="message">
        <div class="spinner"></div>
        <p>Перенаправление на <strong>g-random</strong>...</p>
        <p><small><a href="https://g-wpi.github.io/g-random/">Нажмите здесь</a>, если не перенаправило</small></p>
    </div>
</body>
</html>
